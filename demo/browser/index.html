<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playnet Browser Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-200 font-sans p-4 md:p-8 min-h-screen">
    <div id="app" class="max-w-2xl mx-auto container">
        <header class="mb-6 flex justify-between items-center bg-gray-800 p-4 rounded-lg shadow-lg">
            <div>
                <h1
                    class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                    Browser Node
                </h1>
                <div id="status" class="text-xs text-gray-400 mt-1 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> Initializing...
                </div>
            </div>
            <div id="identity" class="text-right text-xs font-mono text-gray-500"></div>
        </header>

        <div class="bg-gray-800 rounded-lg shadow-xl border border-gray-700 flex flex-col h-[60vh]">
            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth">
                <!-- Messages -->
                <div class="text-center text-gray-600 text-sm py-10">Waiting for messages...</div>
            </div>

            <div class="p-4 bg-gray-900 border-t border-gray-700 rounded-b-lg">
                <form id="chat-form" class="flex gap-3">
                    <input type="text" id="msg-input"
                        class="flex-1 bg-gray-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-700 placeholder-gray-600"
                        placeholder="Type a secure message..." autocomplete="off">
                    <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors flex items-center gap-2">
                        Send
                    </button>
                </form>
            </div>
        </div>

        <div class="mt-4 bg-black rounded p-3 font-mono text-xs text-green-400 h-32 overflow-y-auto border border-gray-800"
            id="debug-log">
            <div>--- DEBUG LOG ---</div>
        </div>

        <div class="mt-8 text-center text-gray-600 text-xs max-w-lg mx-auto">
            <p>This demo runs the <strong>Full Foundation Layer</strong> inside your browser.</p>
            <p>No backend server. Data syncs via Fireproof + WebRTC.</p>
            <p>Open this page in a second window to test sync!</p>
        </div>
    </div>
    <script type="module" src="./main.ts"></script>
</body>

</html>
